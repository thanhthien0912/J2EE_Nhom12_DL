services:
  mongodb:
    image: mongo:7.0
    container_name: nhom12-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: nhom12
    expose:
      - "27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: ./nhom12
      dockerfile: Dockerfile
    container_name: nhom12-backend
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      SPRING_DATA_MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/nhom12}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-https://demo-java.honeysocial.click}
      APP_BACKEND_URL: ${APP_BACKEND_URL:-https://api1.honeysocial.click}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-https://demo-java.honeysocial.click}
      JWT_SECRET: ${JWT_SECRET:-change-me-please-change-this-jwt-secret-to-a-strong-value}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-dummy-client-id}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-dummy-client-secret}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-https://api1.honeysocial.click/login/oauth2/code/google}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_SCOPE: openid,profile,email
      MOMO_PARTNER_CODE: ${MOMO_PARTNER_CODE:-MOMOBKUN20180529}
      MOMO_ACCESS_KEY: ${MOMO_ACCESS_KEY:-dummy-access-key}
      MOMO_SECRET_KEY: ${MOMO_SECRET_KEY:-dummy-secret-key}
      MOMO_API_URL: ${MOMO_API_URL:-https://test-payment.momo.vn/v2/gateway/api/create}
      MOMO_IPN_URL: ${MOMO_IPN_URL:-https://api1.honeysocial.click/momo/ipn}
      MOMO_REDIRECT_URL: ${MOMO_REDIRECT_URL:-https://api1.honeysocial.click/momo/return}
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api1.honeysocial.click/api}
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-https://api1.honeysocial.click}
    container_name: nhom12-frontend
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nhom12-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    environment:
      FRONTEND_DOMAIN: ${FRONTEND_DOMAIN:-demo-java.honeysocial.click}
      BACKEND_DOMAIN: ${BACKEND_DOMAIN:-api1.honeysocial.click}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/docker-entrypoint.d:/docker-entrypoint.d:ro
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot

  certbot:
    image: certbot/certbot:latest
    profiles:
      - tools
    volumes:
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot

volumes:
  mongodb_data:
